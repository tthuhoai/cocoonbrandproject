<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - The Cocoon</title>
  <!-- CSS chung (header, footer) + CSS riêng cho đăng nhập/đăng kí -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
   <link rel="icon" type="image/png" href="../media/coconutlogo.png">
</head>
<body>

  <!-- ========== HEADER (giống trang chủ) ========== -->
  <header class="header">
    <div class="logo">
      <img src="../media/coconutlogo1.png" alt="The Cocoon">
    </div>
    <nav class="nav">
      <a href="index.html">Trang chủ</a>
      <a href="product.html">Sản phẩm</a>
      <a href="blog.html">Bài viết</a>
      <a href="login.html">Đăng nhập</a>
     
    </nav>
    <div class="hotline">📞 19009300</div>
  </header>

  <!-- ========== FORM ĐĂNG NHẬP ========== -->
  <section class="auth-section">
    <div class="auth-form">
      <h1 class="auth-title">Đăng nhập</h1>
      <form>
        <!-- Ô nhập email -->
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Nhập email của bạn" required>
        <!-- Ô nhập mật khẩu -->
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu" required>
        <!-- Nút đăng nhập -->
        <button type="submit" class="auth-btn">Đăng nhập</button>
      </form>
      <!-- Link chuyển sang trang đăng kí -->
      <p class="auth-link">Chưa có tài khoản? <a href="register.html">Đăng kí</a></p>
    </div>
  </section>

  <!-- ========== FOOTER (giống trang chủ) ========== -->
  <footer class="footer">
    <div class="footer-top">
      <div class="footer-logo">
        <img src="../media/coconutlogo.png" alt="The Cocoon">
      </div>
      <p class="footer-desc">Cocoon – Tinh túy từ thực vật Việt Nam cho nhịp sống hiện đại</p>
      <a href="#" class="btn-contact">Liên hệ</a>
    </div>
    <div class="footer-bottom">
      <div class="footer-col">
        <p class="social-title">Social</p>
        <a href="#">📷 Instagram</a>
        <a href="#">📘 Facebook</a>
      </div>
      <div class="footer-col">
        <p class="social-title">Contact Us</p>
        <p class="footer-contact">HOTLINE: <a href="tel:19009300">19009300</a></p>
        <p class="footer-contact">EMAIL: <a href="mailto:WE@COCOONVIETNAM.COM">WE@COCOONVIETNAM.COM</a></p>
      </div>
    </div>
  </footer>

</body>
</html>
