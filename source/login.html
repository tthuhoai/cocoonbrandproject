  <!-- ========== FORM ĐĂNG NHẬP ========== -->
  <section class="py-5" style="min-height: 60vh;">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body p-4">
              <h1 class="text-center mb-4 fs-3" style="font-family: 'Playfair Display', serif;">Đăng nhập</h1>
              <form>
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input type="email" class="form-control" id="email" placeholder="Nhập email của bạn" required>
                </div>
                <div class="mb-3">
                  <label for="password" class="form-label">Mật khẩu</label>
                  <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn w-100 text-white" style="background: #5a7a5a;">Đăng nhập</button>
              </form>
              <p class="text-center mt-3 mb-0">Chưa có tài khoản? <a href="register.html" style="color: #5a7a5a;">Đăng kí</a></p>
            </div>
            </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="text-white py-4" style="background: #3e2723;">
