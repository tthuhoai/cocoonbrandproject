<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng kí - The Cocoon</title>
  <!-- CSS chung (header, footer) + CSS riêng cho đăng nhập/đăng kí -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="auth.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ========== HEADER (giống trang chủ) ========== -->
  <header class="header">
    <div class="logo">
      <img src="../media/coconutlogo1.png" alt="The Cocoon">
    </div>
    <nav class="nav">
      <a href="index.html">Trang chủ</a>
      <a href="product.html">Sản phẩm</a>
      <a href="blog.html">Bài viết</a>
      <a href="login.html">Đăng nhập</a>
      <a href="register.html">Đăng kí</a>
    </nav>
    <div class="hotline">📞 19009300</div>
  </header>

  <!-- ========== FORM ĐĂNG KÍ ========== -->
  <section class="auth-section">
    <div class="auth-form">
      <h1 class="auth-title">Đăng kí</h1>
      <form>
        <!-- Ô nhập họ tên -->
        <label for="fullname">Họ và tên</label>
        <input type="text" id="fullname" placeholder="Nhập họ và tên" required>
        <!-- Ô nhập email -->
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Nhập email của bạn" required>
        <!-- Ô nhập số điện thoại -->
        <label for="phone">Số điện thoại</label>
        <input type="tel" id="phone" placeholder="Nhập số điện thoại" required>
        <!-- Ô nhập mật khẩu -->
        <label for="password">Mật khẩu</label>
        <input type="password" id="password" placeholder="Nhập mật khẩu" required>
        <!-- Ô xác nhận mật khẩu -->
        <label for="confirm-password">Xác nhận mật khẩu</label>
        <input type="password" id="confirm-password" placeholder="Nhập lại mật khẩu" required>
        <!-- Nút đăng kí -->
        <button type="submit" class="auth-btn">Đăng kí</button>
      </form>
      <!-- Link chuyển sang trang đăng nhập -->
      <p class="auth-link">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
    </div>
  </section>

  <!-- ========== FOOTER (giống trang chủ) ========== -->
  <footer class="footer">
    <div class="footer-top">
      <div class="footer-logo">
        <img src="../media/coconutlogo.png" alt="The Cocoon">
      </div>
      <p class="footer-desc">Cocoon – Tinh túy từ thực vật Việt Nam cho nhịp sống hiện đại</p>
      <a href="#" class="btn-contact">Liên hệ</a>
    </div>
    <div class="footer-bottom">
      <div class="footer-col">
        <p class="social-title">Social</p>
        <a href="#">📷 Instagram</a>
        <a href="#">📘 Facebook</a>
      </div>
      <div class="footer-col">
        <p class="social-title">Contact Us</p>
        <p class="footer-contact">HOTLINE: <a href="tel:19009300">19009300</a></p>
        <p class="footer-contact">EMAIL: <a href="mailto:WE@COCOONVIETNAM.COM">WE@COCOONVIETNAM.COM</a></p>
      </div>
    </div>
  </footer>

</body>
</html>
